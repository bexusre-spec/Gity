<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff512f, #dd2476, #7f00ff);
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }

    .title h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .title p {
      font-size: 14px;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 18px 0 22px;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .tabs button.active {
      background: white;
      color: #7f00ff;
    }

    .tabs button.inactive {
      background: rgba(255, 255, 255, 0.18);
      color: white;
    }

    .form {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form.active {
      display: block;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
    }

    .field input:focus {
      border: 2px solid #ffd700;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      transition: transform 0.2s;
    }

    .submit-btn:hover {
      transform: scale(1.02);
    }

    .small-text {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.95;
    }

    .small-text span {
      color: #ffe66d;
      font-weight: bold;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>Bienvenue</h1>
      <p>Connecte-toi ou crée un compte</p>
    </div>

    <div class="tabs">
      <button id="loginTab" class="active" onclick="showLogin()">Sign in</button>
      <button id="registerTab" class="inactive" onclick="showRegister()">Sign up</button>
    </div>

    <div id="loginForm" class="form active">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="ton@email.com" />
      </div>
      <div class="field">
        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="********" />
      </div>
      <button class="submit-btn" onclick="loginUser()">Login</button>
    </div>

    <div id="registerForm" class="form">
      <div class="field">
        <label for="name">Nom complet</label>
        <input type="text" id="name" placeholder="Ton nom" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ton@email.com" />
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Créer un mot de passe" />
      </div>
      <button class="submit-btn" onclick="registerUser()">Register</button>
    </div>

    <div class="small-text">
      Crée ton compte gratuitement, puis connecte-toi.
    </div>
  </div>

  <script>
    function showLogin() {
      document.getElementById("loginForm").classList.add("active");
      document.getElementById("registerForm").classList.remove("active");

      document.getElementById("loginTab").classList.add("active");
      document.getElementById("loginTab").classList.remove("inactive");

      document.getElementById("registerTab").classList.remove("active");
      document.getElementById("registerTab").classList.add("inactive");
    }

    function showRegister() {
      document.getElementById("registerForm").classList.add("active");
      document.getElementById("loginForm").classList.remove("active");

      document.getElementById("registerTab").classList.add("active");
      document.getElementById("registerTab").classList.remove("inactive");

      document.getElementById("loginTab").classList.remove("active");
      document.getElementById("loginTab").classList.add("inactive");
    }

    function loginUser() {
      alert("Login cliqué");
    }

    function registerUser() {
      alert("Register cliqué");
    }
  </script>
</body>
            </html>
