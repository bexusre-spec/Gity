<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Style UI</title>
  <style>
    :root{
      --bg: #e7ebf0;
      --panel: #ffffff;
      --panel-2: #f3f5f7;
      --text: #111827;
      --muted: #7a8696;
      --blue: #2aabee;
      --green: #dff6d7;
      --shadow: 0 10px 24px rgba(0,0,0,.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.55), transparent 30%),
        linear-gradient(180deg, #edf2f7 0%, #e6edf4 100%);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,.18);
    }

    .header {
      padding: 14px 14px 10px;
      display: flex;
      justify-content: flex-end;
    }

    .menu-pill {
      background: #e7f5dc;
      color: #111;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 18px;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .menu-pill small {
      font-size: 12px;
      color: #60725c;
      display: block;
      line-height: 1;
    }

    .menu-pill strong {
      font-size: 18px;
      font-weight: 700;
    }

    .balance-wrap {
      padding: 6px 14px 10px;
    }

    .balance {
      display: inline-block;
      background: var(--panel);
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 22px;
      font-weight: 700;
      box-shadow: var(--shadow);
      line-height: 1.2;
    }

    .balance .coins { font-weight: 700; }
    .balance .money { font-weight: 700; }

    .chat-area {
      flex: 1;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .composer-top {
      background: var(--panel);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--panel-2);
      display: grid;
      place-items: center;
      color: #6b7280;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .placeholder {
      flex: 1;
      color: #9aa3ad;
      font-size: 18px;
      padding-left: 4px;
    }

    .history {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 2px 0;
    }

    .bubble {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }

    .bubble.bot {
      align-self: flex-start;
      background: var(--panel);
      border-top-left-radius: 8px;
    }

    .bubble.user {
      align-self: flex-end;
      background: #dcf8c6;
      border-top-right-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 2px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      background: var(--panel-2);
      color: #111;
      min-height: 68px;
      padding: 10px 12px;
      font-size: 17px;
      font-weight: 500;
      box-shadow: 0 2px 0 rgba(0,0,0,.04);
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
      text-align: center;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(.98); }
    .btn:active { transform: translateY(1px); }

    .bottom {
      padding: 10px 12px 16px;
      background: rgba(255,255,255,.45);
      backdrop-filter: blur(6px);
    }

    .input-bar {
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-bar input {
      border: none;
      outline: none;
      flex: 1;
      background: transparent;
      font-size: 16px;
      color: var(--text);
      min-width: 0;
    }

    .send {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #2aabee, #6f7dff);
      color: white;
      font-size: 18px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    @media (max-width: 520px) {
      .balance { font-size: 18px; }
      .btn { min-height: 62px; font-size: 15px; }
      .placeholder { font-size: 16px; }
      .menu-pill strong { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="menu-pill" onclick="botReply('Menu ouvert')">
        <small>⬅ BACK</small>
        <strong>Menu</strong>
      </div>
    </div>

    <div class="balance-wrap">
      <div class="balance">
        Balance: <span class="coins">911.00 COINS</span> <span>$</span> <span class="money">22Ar</span>
      </div>
    </div>

    <div class="chat-area">
      <div class="composer-top">
        <div class="icon">☺</div>
        <div class="placeholder">Message</div>
        <div class="icon">⌄</div>
        <div class="icon">📷</div>
        <div class="icon">📎</div>
        <div class="icon">◯</div>
      </div>

      <div class="history" id="history">
        <div class="bubble bot">Bienvenue. Tape un message ou choisis un bouton.</div>
        <div class="bubble user">Menu</div>
      </div>

      <div class="grid">
        <button class="btn" onclick="quick('TASK')">TASK</button>
        <button class="btn" onclick="quick('SHARE')">SHARE</button>
        <button class="btn" onclick="quick('GET FOLLOWER')">GET FOLLOWER</button>
        <button class="btn" onclick="quick('GET SHARE')">GET SHARE</button>
        <button class="btn" onclick="quick('GET LIKE')">GET LIKE</button>
        <button class="btn" onclick="quick('GET COMMENT')">GET COMMENT</button>
        <button class="btn" onclick="quick('Withdraw/Deposit')">💸 Withdraw/Deposit</button>
        <button class="btn" onclick="quick('SWAP')">SWAP 🌀</button>
        <button class="btn" onclick="quick('VIP TASK')">⚡ VIP TASK</button>
        <button class="btn" onclick="quick('Referral/Support')">🔗 Referral/Support</button>
        <button class="btn" onclick="quick('Stat Order')">📊 Stat Order</button>
        <button class="btn" onclick="quick('Back Menu')">⬅ BACK Menu</button>
      </div>
    </div>

    <div class="bottom">
      <div class="input-bar">
        <input id="msgInput" type="text" placeholder="Écrire un message..." />
        <button class="send" onclick="sendMessage()">➤</button>
      </div>
      <div class="hint">Style Telegram avec champ d’écriture en bas.</div>
    </div>
  </div>

  <script>
    const historyEl = document.getElementById('history');
    const inputEl = document.getElementById('msgInput');

    function addBubble(text, type) {
      const el = document.createElement('div');
      el.className = `bubble ${type}`;
      el.textContent = text;
      historyEl.appendChild(el);
      historyEl.scrollTop = historyEl.scrollHeight;
    }

    function botReply(text) {
      addBubble(text, 'bot');
    }

    function quick(text) {
      addBubble(text, 'user');
      addBubble(`Action reçue : ${text}`, 'bot');
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addBubble(text, 'user');
      addBubble(`Tu as écrit : ${text}`, 'bot');
      inputEl.value = '';
      inputEl.focus();
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
                                          </html>
