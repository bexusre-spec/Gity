<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff512f, #dd2476, #7f00ff);
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .page {
      display: none;
      animation: fadeIn 0.25s ease;
    }

    .page.active {
      display: block;
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }

    .title h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .title p {
      font-size: 14px;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 18px 0 22px;
    }

    .tabs button, .submit-btn, .secondary-btn {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
    }

    .tabs button.active {
      background: white;
      color: #7f00ff;
    }

    .tabs button.inactive {
      background: rgba(255, 255, 255, 0.18);
      color: white;
    }

    .form {
      display: none;
      animation: fadeIn 0.25s ease;
    }

    .form.active {
      display: block;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
    }

    .field input:focus {
      border: 2px solid #ffd700;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
    }

    .submit-btn:hover, .secondary-btn:hover {
      transform: scale(1.02);
    }

    .secondary-btn {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.16);
      color: white;
      flex: 1;
    }

    .small-text {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.95;
    }

    .message {
      text-align: center;
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
    }

    .success { color: #b7ffb7; font-weight: bold; }
    .error { color: #ffd1d1; font-weight: bold; }

    .card {
      margin-top: 14px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .user-list {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .user-item {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      padding: 12px;
    }

    .user-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="authPage" class="page active">
      <div class="title">
        <h1>Bienvenue</h1>
        <p>Connecte-toi ou crée un compte</p>
      </div>

      <div class="tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Sign in</button>
        <button id="registerTab" class="inactive" onclick="showRegister()">Sign up</button>
      </div>

      <div id="loginForm" class="form active">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="ton@email.com" />
        </div>
        <div class="field">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="********" />
        </div>
        <button class="submit-btn" onclick="loginUser()">Login</button>
      </div>

      <div id="registerForm" class="form">
        <div class="field">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="ton@email.com" />
        </div>
        <div class="field">
          <label for="registerPassword">Mot de passe</label>
          <input type="password" id="registerPassword" placeholder="Créer un mot de passe" />
        </div>
        <button class="submit-btn" onclick="registerUser()">Register</button>
      </div>

      <div id="authMessage" class="message"></div>

      <div class="small-text">
        Crée ton compte gratuitement, puis connecte-toi.
      </div>
    </div>

    <div id="dashboardPage" class="page">
      <div class="title">
        <h1>Tableau de bord</h1>
        <p>Liste des utilisateurs inscrits</p>
      </div>

      <div class="card">
        <h2 id="welcomeTitle">Bienvenue</h2>
        <p id="userInfo"></p>
      </div>

      <div class="top-actions">
        <button class="secondary-btn" onclick="loadUsers()">Rafraîchir</button>
        <button class="secondary-btn" onclick="logoutUser()">Déconnexion</button>
      </div>

      <div class="card">
        <h2>Utilisateurs inscrits</h2>
        <div id="usersList" class="user-list"></div>
      </div>

      <div id="dashboardMessage" class="message"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://singles-oxford-exotic-carpet.trycloudflare.com";
    let currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");

    function setMessage(id, text, type = "") {
      const el = document.getElementById(id);
      el.className = "message " + type;
      el.innerHTML = text;
    }

    function showLogin() {
      document.getElementById("loginForm").classList.add("active");
      document.getElementById("registerForm").classList.remove("active");

      document.getElementById("loginTab").classList.add("active");
      document.getElementById("loginTab").classList.remove("inactive");

      document.getElementById("registerTab").classList.remove("active");
      document.getElementById("registerTab").classList.add("inactive");
    }

    function showRegister() {
      document.getElementById("registerForm").classList.add("active");
      document.getElementById("loginForm").classList.remove("active");

      document.getElementById("registerTab").classList.add("active");
      document.getElementById("registerTab").classList.remove("inactive");

      document.getElementById("loginTab").classList.remove("active");
      document.getElementById("loginTab").classList.add("inactive");
    }

    function showAuthPage() {
      document.getElementById("authPage").classList.add("active");
      document.getElementById("dashboardPage").classList.remove("active");
    }

    function showDashboard() {
      document.getElementById("authPage").classList.remove("active");
      document.getElementById("dashboardPage").classList.add("active");

      if (currentUser) {
        document.getElementById("welcomeTitle").textContent = "Bienvenue " + currentUser.email;
        document.getElementById("userInfo").innerHTML =
          "Ton ID unique : <strong>" + currentUser.id + "</strong>";
      }
    }

    async function registerUser() {
      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value.trim();

      if (!email || !password) {
        setMessage("authMessage", "Remplis tous les champs.", "error");
        return;
      }

      try {
        setMessage("authMessage", '<span class="loader"></span>Inscription en cours...', "");

        const response = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Erreur lors de l'inscription");
        }

        currentUser = {
          id: data.id,
          email: data.email
        };

        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        setMessage("authMessage", `Inscription réussie. ID: ${currentUser.id}`, "success");

        showDashboard();
        await loadUsers();
      } catch (error) {
        setMessage("authMessage", error.message, "error");
      }
    }

    async function loginUser() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        setMessage("authMessage", "Remplis tous les champs.", "error");
        return;
      }

      try {
        setMessage("authMessage", '<span class="loader"></span>Connexion en cours...', "");

        const response = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Erreur lors de la connexion");
        }

        currentUser = {
          id: data.id,
          email: data.email
        };

        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        setMessage("authMessage", "Connexion réussie.", "success");

        showDashboard();
        await loadUsers();
      } catch (error) {
        setMessage("authMessage", error.message, "error");
      }
    }

    async function loadUsers() {
      try {
        document.getElementById("usersList").innerHTML = "Chargement...";

        const response = await fetch(`${API_URL}/users`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Impossible de charger les utilisateurs");
        }

        const users = data.users || [];

        if (users.length === 0) {
          document.getElementById("usersList").innerHTML = "<div class='user-item'>Aucun utilisateur trouvé.</div>";
          return;
        }

        document.getElementById("usersList").innerHTML = users.map(user => `
          <div class="user-item">
            <strong>${user.email}</strong>
            <span>ID : ${user.id}</span><br>
            <span>Créé le : ${user.created_at}</span>
          </div>
        `).join("");
      } catch (error) {
        document.getElementById("usersList").innerHTML =
          `<div class="user-item">Erreur : ${error.message}</div>`;
      }
    }

    function logoutUser() {
      currentUser = null;
      localStorage.removeItem("currentUser");

      document.getElementById("loginEmail").value = "";
      document.getElementById("loginPassword").value = "";
      document.getElementById("registerEmail").value = "";
      document.getElementById("registerPassword").value = "";

      setMessage("authMessage", "", "");
      showAuthPage();
      showLogin();
    }

    window.addEventListener("load", async () => {
      if (currentUser) {
        showDashboard();
        await loadUsers();
      } else {
        showAuthPage();
        showLogin();
      }
    });
  </script>
</body>
  </html>
